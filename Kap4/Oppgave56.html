<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flervalgsoppgaver R2</title>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<body>

<a href="../index.html">← Tilbake til hovedsiden</a>

<div class="status">
    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>
    <div class="teller">
        Riktig: <span id="riktig">0</span> |
        Feil: <span id="feil">0</span> |
        Score: <span id="prosent">0</span>%
    </div>
</div>

<div class="container">
    <div class="box">
        <p>Gitt tre punkter \(A(1, 1, 0)\), \(B(4, 1, 1)\) og \(C(2, 0, -1)\).</p>


        <p><strong>Hva er riktig utregning for arealet av trekanten \(ABC\)?</strong></p>

        <form id="quiz">
            <label class="svar" tabindex="0">
                <input type="radio" name="svar" value="riktig">
                <span>\( \frac{|\left[ 3, 0, 1 \right] \times \left[ 1, -1, -1 \right] |}{2} \)</span>
            </label>

            <label class="svar" tabindex="0">
                <input type="radio" name="svar" value="feil">
                <span>\( \frac{|\left[ 3, 0, 1 \right] \times \left[ 1, -1, -1 \right] |}{3} \)</span>
            </label>

            <label class="svar" tabindex="0">
                <input type="radio" name="svar" value="feil">
                <span>\( \frac{|\left[ 3, 0, 1 \right] \times \left[ 1, -1, -1 \right] |}{6} \)</span>
            </label>

        </form>

        <button id="neste" onclick="nesteSporsmal()">Neste spørsmål</button>
    </div>

</div>

</body>
</html>
