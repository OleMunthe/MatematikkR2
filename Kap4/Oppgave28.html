<div class="container">
    <div class="box">
               $$
                        \begin{cases} x &= 2 + t \\ y &= -1 - 3t \\ z &= 1 + 2t \end{cases}   \;\;\;\;,\;\;\;\; \begin{cases} x &= 1 + 2t \\ y &= 1 - 2t \\ z &= 1 + t \end{cases} 
        $$

        <p><strong>Hvilken utregning gir vinkelen \( \alpha \) mellom linjene?</strong></p>

        <form id="quiz">
            <label class="svar" tabindex="0">
                <input type="radio" name="svar" value="riktig">
                <span>\( [1, -3, 2] \cdot [2, -2, 1] = \sqrt{1^2 + (-3)^2 + 2^2} \cdot \sqrt{2^2 + (-2)^2 + 1^2} \cdot \cos \alpha  \)</span>
            </label>

            <label class="svar" tabindex="0">
                <input type="radio" name="svar" value="feil">
                <span>\( [1, -3, 2] \cdot [2, -2, 1]  = \sqrt{1^2 + (-3)^2 + 2^2} \cdot \sqrt{2^2 + (-2)^2 + 1^2} \cdot \sin \alpha  \)</span>
            </label>

            <label class="svar" tabindex="0">
                <input type="radio" name="svar" value="feil">
                <span>\( \sqrt{1^2 + (-3)^2 + 2^2} \cdot \sqrt{2^2 + (-2)^2 + 1^2} = [1, -3, 2] \cdot [2, -2, 1]  \cdot \cos \alpha  \)</span>
            </label>

            <label class="svar" tabindex="0">
                <input type="radio" name="svar" value="feil">
                <span>\( \sqrt{1^2 + (-3)^2 + 2^2} \cdot \sqrt{2^2 + (-2)^2 + 1^2} = [1, -3, 2] \cdot [2, -2, 1]  \cdot \sin \alpha  \)</span>
            </label>

     
        </form>

        <button id="neste" onclick="nesteSporsmal()">Neste spørsmål</button>
    </div>

</div>
