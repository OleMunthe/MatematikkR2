<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0877ab">

<title>Flervalgsoppgaver R2</title>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<link rel="stylesheet" href="../FlervalgsStyle.css">
<script src="../FlervalgScript.js" defer></script>

</head>

<body>

<a href="../index.html">← Tilbake til hovedsiden</a>

<div class="status">
    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>
    <div class="teller">
        Riktig: <span id="riktig">0</span> |
        Feil: <span id="feil">0</span> |
        Score: <span id="prosent">0</span>%
    </div>
</div>

<div class="container">
    <div class="box">
        <p>Posisjonen til en fotball er gitt ved</p>

        $$
                \vec{r}(t) = \left[ 3t, 5t, 4t - 5t^2    \right]
        $$
        <p>Enhetene på aksene er meter, og tiden \(t\) måles i sekunder.</p>

       <p><strong>Hvordan kan vi beregne strekningen ballen tilbakelegget mellom \(t=0\) og \(t=1\)?</strong></p>

        <form id="quiz">
            <label class="svar" tabindex="0">
                <input type="radio" name="svar" value="riktig">
                <span>\( \int_0^1 \sqrt{3^2 + 5^2 + (4 - 10t)^2 } \; dt \)</span>
            </label>

            <label class="svar" tabindex="0">
                <input type="radio" name="svar" value="feil">
                <span>\( \int_0^1 \sqrt{(3t)^2 + (5t)^2 + (4t - 5t^2)^2 } \; dt \)</span>
            </label>

            <label class="svar" tabindex="0">
                <input type="radio" name="svar" value="feil">
                <span>\( \int_0^1 \left(3 + 5 + 4 - 10t \right) \; dt \)</span>
            </label>

            <label class="svar" tabindex="0">
                <input type="radio" name="svar" value="feil">
                <span>\( \int_0^1 \left(3t + 5t + 4t - 5t^2 \right) \; dt \)</span>
            </label>

        </form>

        <button id="neste" onclick="nesteSporsmal()">Neste spørsmål</button>
    </div>

</div>

</body>
</html>
