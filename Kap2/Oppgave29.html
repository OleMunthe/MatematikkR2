<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0877ab">

<title>Flervalgsoppgaver R2</title>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<link rel="stylesheet" href="../FlervalgsStyle.css">
<script src="../FlervalgScript.js" defer></script>

<style>
img {
    max-height: 300px;
    max-width: 450px;
}
</style>
</head>

<body>

<a href="../index.html">← Tilbake til hovedsiden</a>

<div class="status">
    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>
    <div class="teller">
        Riktig: <span id="riktig">0</span> |
        Feil: <span id="feil">0</span> |
        Score: <span id="prosent">0</span>%
    </div>
</div>

<div class="container">
    <div class="box">
        <p>Grafikkfeltet viser grafen til \(f\) og grafen til \(F\), hvor</p>

        $$
                F'(x) = f(x)
        $$

        <p>Vi skal bestemme arealet av flatestykket mellom grafen til \(f\) og \(x\)-aksen i intervallet \(x \in [1\;,\;4]\).</p>

        <p><strong>Hva gir riktig utregning?</strong></p>

        <form id="quiz">
            <label class="svar" tabindex="0">
                <input type="radio" name="svar" value="riktig">
                <span>\( F(4) - F(1) \)</span>
            </label>

            <label class="svar" tabindex="0">
                <input type="radio" name="svar" value="feil">
                <span>\( f(4) - f(1) \)</span>
            </label>

            <label class="svar" tabindex="0">
                <input type="radio" name="svar" value="feil">
                <span>\( F(6) - F(-1) \)</span>
            </label>

            <label class="svar" tabindex="0">
                <input type="radio" name="svar" value="feil">
                <span>\( f(6) - f(-1) \)</span>
            </label>
        </form>

        <button id="neste" onclick="nesteSporsmal()">Neste spørsmål</button>
    </div>

    <div class="box" style="display: grid; place-items: center;">
        <img src="fundamental.png" alt="">
    </div>
</div>

</body>
</html>
